<!-- ===== FORGOT PASSWORD ===== -->
<div class="forgot-password-page min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">

  <!-- Floating orbs -->
  <div class="position-absolute top-0 start-0 w-100 h-100 background-overlay">
    <div class="floating-orb orb-green"></div>
    <div class="floating-orb orb-yellow"></div>
  </div>

  <div class="card border-0 shadow-lg w-100 animate__animated animate__fadeInUp forgot-password-card">

    <!-- Header -->
    <div class="rounded-top-4 py-4 px-4 text-center forgot-password-header">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-2 forgot-password-header-icon">
        <i class="fa-solid fa-key fa-lg text-success"></i>
      </div>
      <h4 class="fw-bold text-white mb-0 mt-1 header-title">Forgot Password</h4>
      <p class="text-white-50 small mb-0 header-subtitle">We'll send you a reset link</p>
    </div>

    <div class="card-body p-4">

      <!-- Info badge -->
      <div class="info-badge d-flex align-items-center gap-3 mb-4 p-3 rounded-3 animate__animated animate__fadeIn">
        <div class="info-badge-icon d-flex align-items-center justify-content-center flex-shrink-0 rounded-circle">
          <i class="fa-solid fa-shield-halved text-success small"></i>
        </div>
        <p class="text-white-50 small mb-0" *ngIf="step === 1">Enter the email linked to your account and we'll send a secure reset link.</p>
        <p class="text-white-50 small mb-0" *ngIf="step === 2">Enter the 6-digit verification code sent to your email.</p>
        <p class="text-white-50 small mb-0" *ngIf="step === 3">Set a strong new password for your account.</p>
      </div>

      <div *ngIf="message" class="alert alert-warning text-center small mb-4">
        {{ message }}
      </div>

      <form *ngIf="step === 1" [formGroup]="VaryfyEmail" class="forgot-form" (ngSubmit)="onSubmitEmail()">
        <div class="mb-4 animate__animated animate__fadeInLeft delay-1">
          <label class="form-label text-white-50 small fw-semibold mb-1">
            <i class="fa-solid fa-envelope me-1 text-success"></i> Email Address
          </label>
          <div class="input-group">
            <span class="input-group-text border-0 text-success input-group-text-custom">
              <i class="fa-solid fa-envelope"></i>
            </span>
            <input formControlName="email" type="email" class="form-control border-0 text-white form-control-custom"
              placeholder="you@example.com">
          </div>
        </div>

        <button type="submit" [disabled]="VaryfyEmail.invalid || isLoading" class="btn btn-lg w-100 fw-bold text-white animate__animated animate__fadeInUp delay-1 form-button">
          <i class="fa-solid fa-paper-plane me-2"></i>
          {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <form *ngIf="step === 2" [formGroup]="Varyfycode" class="forgot-form" (ngSubmit)="onVerifyCode()">
        <div class="mb-4 animate__animated animate__fadeInLeft delay-1">
          <label class="form-label text-white-50 small fw-semibold mb-1">
            <i class="fa-solid fa-key me-1 text-success"></i> Reset Code
          </label>
          <div class="input-group">
            <span class="input-group-text border-0 text-success input-group-text-custom">
              <i class="fa-solid fa-key"></i>
            </span>
            <input formControlName="resetCode" type="text" class="form-control border-0 text-white form-control-custom"
              placeholder="Enter 6-digit code">
          </div>
        </div>

        <button type="submit" [disabled]="Varyfycode.invalid || isLoading" class="btn btn-lg w-100 fw-bold text-white animate__animated animate__fadeInUp delay-1 form-button">
          <i class="fa-solid fa-paper-plane me-2"></i>
          {{ isLoading ? 'Verifying...' : 'Verify Code' }}
        </button>

        <button type="button" class="btn btn-link text-white-50 mt-3" (click)="step = 1">
          <i class="fa-solid fa-arrow-left me-2"></i> Back to Email
        </button>
      </form>

      <form *ngIf="step === 3" [formGroup]="ResetPassword" class="forgot-form" (ngSubmit)="onResetPassword()">
        <div class="mb-4 animate__animated animate__fadeInLeft delay-1">
          <label class="form-label text-white-50 small fw-semibold mb-1">
            <i class="fa-solid fa-lock me-1 text-success"></i> New Password
          </label>
          <div class="input-group">
            <span class="input-group-text border-0 text-success input-group-text-custom">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input formControlName="newPassword" type="password" class="form-control border-0 text-white form-control-custom"
              placeholder="Enter your new password">
          </div>
        </div>

        <button type="submit" [disabled]="ResetPassword.invalid || isLoading" class="btn btn-lg w-100 fw-bold text-white animate__animated animate__fadeInUp delay-1 form-button">
          <i class="fa-solid fa-paper-plane me-2"></i>
          {{ isLoading ? 'Resetting...' : 'Reset Password' }}
        </button>

        <button type="button" class="btn btn-link text-white-50 mt-3" (click)="step = 2">
          <i class="fa-solid fa-arrow-left me-2"></i> Back to Code
        </button>
      </form>

      <p class="text-center text-white-50 small mt-4 mb-0" *ngIf="step !== 1">
        Remember your password?
        <a routerLink="/auth/login" class="text-warning fw-bold text-decoration-none">Sign In</a>
      </p>

    </div>
  </div>
</div>
