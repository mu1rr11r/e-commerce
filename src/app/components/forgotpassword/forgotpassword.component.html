<!-- ===== FORGOT PASSWORD ===== -->
<div class="min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden"
  style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);">

  <!-- Floating orbs -->
  <div class="position-absolute top-0 start-0 w-100 h-100" style="pointer-events:none;overflow:hidden;">
    <div class="position-absolute rounded-circle opacity-20"
      style="width:260px;height:260px;background:radial-gradient(circle,#34d399,transparent);top:-70px;right:-60px;animation:floatOrb 10s ease-in-out infinite;"></div>
    <div class="position-absolute rounded-circle opacity-20"
      style="width:200px;height:200px;background:radial-gradient(circle,#f7c948,transparent);bottom:-50px;left:-50px;animation:floatOrb 8s ease-in-out infinite reverse;"></div>
  </div>

  <div class="card border-0 shadow-lg w-100 animate__animated animate__fadeInUp"
    style="max-width:420px; border-radius:24px; background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.12) !important;">

    <!-- Header -->
    <div class="rounded-top-4 py-4 px-4 text-center"
      style="background:linear-gradient(90deg,#064e3b,#065f46); border-radius:24px 24px 0 0;">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-2"
        style="width:56px;height:56px;background:rgba(52,211,153,0.15); border:2px solid rgba(52,211,153,0.4);">
        <i class="fa-solid fa-key fa-lg text-success"></i>
      </div>
      <h4 class="fw-bold text-white mb-0 mt-1" style="letter-spacing:1px;">Forgot Password</h4>
      <p class="text-white-50 small mb-0">We'll send you a reset link</p>
    </div>

    <div class="card-body p-4">

      <!-- Info badge -->
      <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded-3 animate__animated animate__fadeIn"
        style="background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.2);">
        <div class="d-flex align-items-center justify-content-center flex-shrink-0 rounded-circle"
          style="width:36px;height:36px;background:rgba(52,211,153,0.15);">
          <i class="fa-solid fa-shield-halved text-success small"></i>
        </div>
        <p class="text-white-50 small mb-0">Enter the email linked to your account and we'll send a secure reset link.</p>
      </div>

      <form>

        <!-- Email -->
        <div class="mb-4 animate__animated animate__fadeInLeft" style="animation-delay:.1s">
          <label class="form-label text-white-50 small fw-semibold mb-1">
            <i class="fa-solid fa-envelope me-1 text-success"></i> Email Address
          </label>
          <div class="input-group">
            <span class="input-group-text border-0 text-success"
              style="background:rgba(255,255,255,0.08); border-radius:12px 0 0 12px;">
              <i class="fa-solid fa-envelope"></i>
            </span>
            <input type="email" class="form-control border-0 text-white"
              style="background:rgba(255,255,255,0.08); border-radius:0 12px 12px 0; transition:background .3s;"
              onfocus="this.style.background='rgba(52,211,153,0.12)'"
              onblur="this.style.background='rgba(255,255,255,0.08)'"
              placeholder="you@example.com">
          </div>
        </div>

        <!-- Button -->
        <button class="btn btn-lg w-100 fw-bold text-white animate__animated animate__fadeInUp"
          style="background:linear-gradient(90deg,#059669,#10b981); border-radius:14px; letter-spacing:.5px; transition:transform .2s,box-shadow .2s; animation-delay:.2s;"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(16,185,129,0.45)'"
          onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
          <i class="fa-solid fa-paper-plane me-2"></i> Send Reset Link
        </button>

        <!-- Back to login -->
        <p class="text-center text-white-50 small mt-4 mb-0">
          Remember your password?
          <a routerLink="/auth/login" class="text-warning fw-bold text-decoration-none">Sign In</a>
        </p>

      </form>
    </div>
  </div>
</div>
