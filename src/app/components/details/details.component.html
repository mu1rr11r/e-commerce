<section class="product-details py-5">
	<div class="container-xl">
		<ng-container *ngIf="product; else loading">
			<div class="row g-4">
				<div class="col-md-6">
					<div class="product-img-wrap">
						<img
							[src]="product.imageCover || product.images?.[0]"
							[alt]="product.title"
							class="img-fluid"
						/>
					</div>
				</div>

				<div class="col-md-6">
					<h1 class="product-title">{{ product.title }}</h1>
					<div class="product-category text-muted">{{ product.category?.name }}</div>

					<div class="my-3">
						<span class="h4 text-warning">{{ (product.priceAfterDiscount || product.price) | currency:'EGP':'symbol':'1.0-0' }}</span>
						<span class="text-muted ms-2" *ngIf="product.priceAfterDiscount" style="text-decoration:line-through">{{ product.price | currency:'EGP':'symbol':'1.0-0' }}</span>
					</div>

					<p class="product-desc">{{ product.description }}</p>

					<div class="mt-3">
						<button class="btn btn-primary me-2" (click)="addToCart(product._id)">Add to cart</button>
						<button class="btn btn-outline-secondary">Add to wishlist</button>
					</div>
				</div>
			</div>
		</ng-container>

		<ng-template #loading>
			<p>Loading product...</p>
		</ng-template>
	</div>
</section>
